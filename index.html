<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Figtree', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }

    /* ---- THEME VARIABLES ---- */
    :root {
      --bg: #f5f7fa;
      --bg-card: #ffffff;
      --bg-elevated: #f0f2f5;
      --bg-suggestion: #fefce8;
      --bg-auto-yes: #ecfdf5;
      --bg-auto-no: #fef2f2;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --text-1: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --accent: #b45309;
      --accent-light: #fef3c7;
      --success: #059669;
      --success-light: #d1fae5;
      --success-hover: #047857;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --danger-hover: #b91c1c;
      --info: #0284c7;
      --info-light: #e0f2fe;
      --purple: #7c3aed;
      --purple-light: #ede9fe;
    }

    .dark {
      --bg: #07090d;
      --bg-card: #0d1117;
      --bg-elevated: #151b25;
      --bg-suggestion: #1a1708;
      --bg-auto-yes: #071a12;
      --bg-auto-no: #1a0808;
      --border: #1e293b;
      --border-strong: #334155;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
      --text-1: #e2e8f0;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --accent: #f59e0b;
      --accent-light: #78350f;
      --success: #34d399;
      --success-light: #064e3b;
      --success-hover: #6ee7b7;
      --danger: #fb7185;
      --danger-light: #881337;
      --danger-hover: #fda4af;
      --info: #38bdf8;
      --info-light: #0c4a6e;
      --purple: #a78bfa;
      --purple-light: #4c1d95;
    }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Figtree', system-ui, sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.3s ease, transform 0.3s ease;
    }
    .card:hover { box-shadow: var(--shadow-hover); border-color: var(--border-strong); }

    .source-badge { font-size: 0.6rem; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
    .source-ax { background: #dbeafe; color: #1d4ed8; }
    .source-ils { background: var(--purple-light); color: var(--purple); }
    .source-email { background: var(--bg-elevated); color: var(--text-3); }
    .dark .source-ax { background: #1e3a5f; color: #60a5fa; }
    .dark .source-ils { background: #3b1f5e; color: #c084fc; }
    .dark .source-email { background: #1e293b; color: #94a3b8; }

    .class-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: 0.03em; }
    .class-quote { background: var(--accent-light); color: var(--accent); }
    .class-yes { background: var(--success-light); color: var(--success); }
    .class-no { background: var(--danger-light); color: var(--danger); }

    .btn { font-weight: 600; font-size: 0.8125rem; padding: 8px 18px; border-radius: 8px; transition: all 0.15s ease; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border: none; }
    .btn-approve { background: var(--success); color: white; }
    .btn-approve:hover { background: var(--success-hover); box-shadow: 0 2px 8px rgba(5,150,105,0.3); }
    .btn-decline { background: var(--bg-elevated); color: var(--text-2); border: 1px solid var(--border); }
    .btn-decline:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
    .btn-details { background: transparent; color: var(--text-3); padding: 8px 12px; }
    .btn-details:hover { color: var(--text-2); background: var(--bg-elevated); }
    .btn-edit { background: var(--bg-elevated); color: var(--text-2); border: 1px solid var(--border); }
    .btn-edit:hover { background: var(--info-light); color: var(--info); border-color: var(--info); }

    .price-input {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600; font-size: 1.05rem;
      background: var(--bg-elevated); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 6px 10px 6px 26px;
      color: var(--text-1); width: 140px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .price-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }

    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow);
      border-radius: 10px; padding: 14px 18px; flex: 1; transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: var(--border-strong); }

    @keyframes pulse-urgent { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .urgent-pulse { animation: pulse-urgent 1.5s ease-in-out infinite; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.25s ease-out; }

    @keyframes cardOut { to { opacity: 0; transform: translateX(40px) scale(0.98); } }
    .card-out { animation: cardOut 0.3s ease-out forwards; }

    .detail-expand { overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 0; opacity: 0; }
    .detail-expand.open { max-height: 1200px; opacity: 1; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px);
      padding: 12px 24px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
      z-index: 100; opacity: 0; transition: all 0.3s ease; pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-approve { background: var(--success); color: white; }
    .toast-decline { background: var(--danger); color: white; }

    .filter-btn {
      font-size: 0.8125rem; font-weight: 500; padding: 6px 14px; border-radius: 8px;
      color: var(--text-3); background: transparent; border: 1px solid transparent;
      transition: all 0.15s; cursor: pointer;
    }
    .filter-btn:hover { color: var(--text-2); background: var(--bg-elevated); }
    .filter-btn.active { color: var(--text-1); background: var(--bg-card); border-color: var(--border); box-shadow: var(--shadow); }

    .progress-track { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.5s ease; }

    .kbd { font-size: 0.6rem; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-family: 'IBM Plex Mono', monospace; color: var(--text-3); }

    .theme-toggle {
      width: 44px; height: 24px; border-radius: 12px; background: var(--bg-elevated);
      border: 1px solid var(--border); position: relative; cursor: pointer; transition: background 0.3s;
    }
    .theme-toggle .dot {
      width: 18px; height: 18px; border-radius: 9px; background: var(--text-3);
      position: absolute; top: 2px; left: 2px; transition: transform 0.3s, background 0.3s;
    }
    .dark .theme-toggle .dot { transform: translateX(20px); background: #f59e0b; }

    /* ---- MOBILE RESPONSIVE ---- */
    @media (max-width: 640px) {
      .stat-card { padding: 10px 12px; }
      .stat-card .w-9 { width: 28px; height: 28px; min-width: 28px; }
      .stat-card .w-9 i { font-size: 0.75rem; }
      .stat-card .text-xl { font-size: 1rem; }
      .stat-card .text-\[0\.65rem\] { font-size: 0.55rem; }

      .filter-btn { font-size: 0.7rem; padding: 5px 8px; }
      .filter-btn i { display: none; }

      .btn { font-size: 0.75rem; padding: 7px 12px; gap: 4px; }

      .price-input { width: 110px; font-size: 0.9rem; padding: 5px 8px 5px 22px; }

      .card .detail-expand .grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body class="min-h-screen">

  <div id="toast" class="toast"></div>

  <!-- ========== HEADER ========== -->
  <header class="sticky top-0 z-40 border-b" style="background: var(--bg-card); border-color: var(--border);">

function fmt(n) {
  return n.toLocaleString('en-US');
}

function getFiltered() {
  let items = rfqs.filter(r => !state.processedIds.includes(r.id));
  if (state.filter !== 'all') items = items.filter(r => r.classification === state.filter);
  if (state.search) {
    const s = state.search.toLowerCase();
    items = items.filter(r =>
      r.company.toLowerCase().includes(s) || r.partNumber.toLowerCase().includes(s) ||
      r.description.toLowerCase().includes(s) || r.contact.toLowerCase().includes(s)
    );
  }
  return items.sort((a, b) => (b.urgent ? 1 : 0) - (a.urgent ? 1 : 0));
}

function buildSparkline(prices) {
  if (prices.length < 2) return '';
  const rev = [...prices].reverse();
  const min = Math.min(...rev) * 0.97, max = Math.max(...rev) * 1.03, range = max - min || 1;
  const w = 100, h = 28, pad = 3;
  const pts = rev.map((p, i) => {
    const x = pad + (i / (rev.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (p - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  });
  const last = pts[pts.length - 1].split(',');
  return `<svg viewBox="0 0 ${w} ${h}" class="w-24 h-7 inline-block align-middle">
    <defs><linearGradient id="sfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--info)" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="var(--info)" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${pts.join(' ')} ${w-pad},${h-pad} ${pad},${h-pad}" fill="url(#sfill)"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="var(--info)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2" fill="var(--info)"/>
  </svg>`;
}

          <button onclick="declineRfq(${r.id})" class="btn btn-decline justify-center"><i class="ph ph-x text-sm"></i> <span class="hidden sm:inline">Decline</span></button>
        ` : `
          <button onclick="approveRfq(${r.id})" class="btn btn-approve flex-1 sm:flex-none justify-center"><i class="ph-bold ph-paper-plane-right text-sm"></i> Send</button>
          <button onclick="declineRfq(${r.id})" class="btn btn-decline justify-center"><i class="ph ph-x text-sm"></i> <span class="hidden sm:inline">Don't Send</span></button>
        `}
        <button onclick="toggleExpand(${r.id})" class="btn btn-details justify-center">
          <i class="ph ph-caret-${isExpanded ? 'up' : 'down'} text-sm"></i> Details
        </button>
        <div class="flex-1 hidden sm:block"></div>
        <span class="text-[0.65rem] hidden sm:inline" style="color: var(--text-3);"><kbd class="kbd">A</kbd> approve <kbd class="kbd ml-1">R</kbd> decline</span>
      </div>

      <!-- EXPANDABLE DETAILS -->
      <div class="detail-expand ${isExpanded ? 'open' : ''}">
        <div class="px-3 sm:px-5 py-3 sm:py-4 border-t" style="border-color: var(--border); background: var(--bg-elevated);">
          <div class="grid grid-cols-1 ${isQuote ? 'sm:grid-cols-2' : ''} gap-3 sm:gap-4">
            <!-- Original Email -->
            <div class="rounded-lg p-4" style="background: var(--bg-card); border: 1px solid var(--border);">
              <div class="flex items-center gap-2 mb-2">
                <i class="ph ph-envelope-simple text-sm" style="color: var(--text-3);"></i>
                <span class="text-[0.7rem] font-700 uppercase tracking-wider" style="color: var(--text-3);">Original Email</span>
              </div>
              <pre class="text-xs leading-relaxed whitespace-pre-wrap font-sans" style="color: var(--text-2);">${r.emailBody}</pre>
            </div>
            ${isQuote ? `
            <!-- Price History -->
            <div>
              <div class="rounded-lg p-4 mb-3" style="background: var(--bg-card); border: 1px solid var(--border);">
                <div class="text-[0.7rem] font-700 uppercase tracking-wider mb-2" style="color: var(--text-3);">
                  <i class="ph ph-chart-line-up text-xs"></i> Price History (90 Days)
                </div>
                <table class="w-full text-xs">
                  <thead><tr style="border-bottom: 1px solid var(--border);">
                    <th class="text-left py-1.5 font-500" style="color: var(--text-3);">Date</th>
                    <th class="text-left py-1.5 font-500" style="color: var(--text-3);">Customer</th>
                    <th class="text-right py-1.5 font-500" style="color: var(--text-3);">Qty</th>
                    <th class="text-right py-1.5 font-500" style="color: var(--text-3);">Price</th>
                  </tr></thead>
                  <tbody>${r.priceHistory.map(p => `
                    <tr style="border-bottom: 1px solid var(--border);">
                      <td class="py-1.5 font-mono" style="color: var(--text-3);">${p.date}</td>
                      <td class="py-1.5" style="color: var(--text-2);">${p.customer}</td>
                      <td class="py-1.5 text-right" style="color: var(--text-3);">${p.qty}</td>
                      <td class="py-1.5 text-right font-mono font-600" style="color: var(--text-1);">$${fmt(p.price)}</td>
                    </tr>`).join('')}
                  </tbody>
                </table>
              </div>
              <!-- Full AI Response Preview -->
              <div class="rounded-lg p-4" style="background: var(--bg-card); border: 1px solid var(--border);">
                <div class="text-[0.7rem] font-700 uppercase tracking-wider mb-2" style="color: var(--text-3);">
                  <i class="ph ph-envelope text-xs"></i> Email That Will Be Sent
                </div>
                <pre class="text-xs leading-relaxed whitespace-pre-wrap font-sans" style="color: var(--text-2);">${r.aiResponse}</pre>
              </div>
            </div>
            ` : `
            <!-- Full AI Response (non-quote) is shown in same column -->
            <div class="rounded-lg p-4" style="background: var(--bg-card); border: 1px solid var(--border);">
              <div class="text-[0.7rem] font-700 uppercase tracking-wider mb-2" style="color: var(--text-3);">
                <i class="ph ph-envelope text-xs"></i> Email That Will Be Sent
              </div>
              <pre class="text-xs leading-relaxed whitespace-pre-wrap font-sans" style="color: var(--text-2);">${r.aiResponse}</pre>
            </div>
            `}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ====================================================================
// ACTIONS
// ====================================================================
function approveRfq(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const r = rfqs.find(x => x.id === id);
  if (card) card.classList.add('card-out');
  setTimeout(() => {
    state.processedIds.push(id);
    state.totalProcessed++;
    if (state.expandedId === id) state.expandedId = null;
    updateStats();
    render();
    showToast('approve', `${r.classification === 'quote_required' ? 'Quote' : 'Response'} sent to ${r.company}`);
  }, 280);
}

function declineRfq(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const r = rfqs.find(x => x.id === id);
  if (card) card.classList.add('card-out');
  setTimeout(() => {
    state.processedIds.push(id);
    state.totalProcessed++;
    if (state.expandedId === id) state.expandedId = null;
    updateStats();
    render();
    showToast('decline', `Declined ${r.company} — ${r.partNumber}`);
  }, 280);
}

function toggleExpand(id) {
  state.expandedId = state.expandedId === id ? null : id;
  render();
}

function updateTotal(id, val) {
  const r = rfqs.find(x => x.id === id);
  const price = parseFloat(val.replace(/,/g, '')) || 0;
  const totalEl = document.querySelector(`[data-total="${id}"]`);
  if (totalEl) totalEl.textContent = '$' + fmt(Math.round(price * r.quantity));
}

function setFilter(f) {
  state.filter = f;
  state.expandedId = null;
  state.focusedIndex = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function handleSearch(val) {
  state.search = val;
  state.focusedIndex = 0;
  render();
}

function updateStats() {
  const pending = rfqs.filter(r => r.classification === 'quote_required' && !state.processedIds.includes(r.id)).length;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-sent').textContent = state.totalProcessed;
  document.getElementById('fcount-quote').textContent = pending;

  const remaining = rfqs.filter(r => !state.processedIds.includes(r.id)).length;
  const total = state.totalEmails;
  const processed = total - remaining;
  document.getElementById('progress-label').textContent = `${remaining} remaining`;
  document.getElementById('progress-count').textContent = `${processed}/${total}`;
  document.getElementById('progress-bar').style.width = `${(processed / total) * 100}%`;
  document.getElementById('queue-badge') && (document.getElementById('queue-badge').textContent = pending);
}

function showToast(type, msg) {
  const t = document.getElementById('toast');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="ph-bold ${type === 'approve' ? 'ph-check-circle' : 'ph-x-circle'} mr-2"></i>${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleTheme() {
  document.body.classList.toggle('dark');
}

// ====================================================================
// KEYBOARD SHORTCUTS
// ====================================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  const items = getFiltered();
  switch(e.key.toLowerCase()) {
    case 'j': case 'arrowdown':
      e.preventDefault();
      state.focusedIndex = Math.min(state.focusedIndex + 1, items.length - 1);
      render();
      document.querySelector(`[data-idx="${state.focusedIndex}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      break;
    case 'k': case 'arrowup':
      e.preventDefault();
      state.focusedIndex = Math.max(state.focusedIndex - 1, 0);
      render();
      document.querySelector(`[data-idx="${state.focusedIndex}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      break;
    case 'a':
      if (items[state.focusedIndex]) approveRfq(items[state.focusedIndex].id);
      break;
    case 'r':
      if (items[state.focusedIndex]) declineRfq(items[state.focusedIndex].id);
      break;
    case 'enter':
      if (items[state.focusedIndex]) toggleExpand(items[state.focusedIndex].id);
      break;
    case 'p':
      if (items[state.focusedIndex]) {
        const inp = document.querySelector(`[data-price-input="${items[state.focusedIndex].id}"]`);
        if (inp) { inp.focus(); inp.select(); }
      }
      break;
  }
});

// ====================================================================
// INIT
// ====================================================================
render();
updateStats();
</script>

</body>
</html>
